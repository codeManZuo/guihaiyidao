# ==============================
# 归海一刀 - 游戏难度配置（H5）
# 说明：
# - 本文件为 properties 格式：key=value
# - 修改后刷新页面即可生效（无需改代码）
# - 时间单位统一为毫秒（ms）
# ==============================

# 开局时间（越大越容易）
time.startMs=7000

# 时间上限（时间条最大值）
time.maxMs=7000

# 每次成功砍击/得分返还的时间（越大越容易）
time.addPerChopMs=400

# 时间流逝倍率（1.0=正常；0.9=更慢更容易；1.1=更快更难）
time.decayScale=2
# 障碍生成：出现“空位”（没有树枝）的概率（越大越容易）
obstacle.noneChance=0.3

# 障碍生成：是否尽量避免连续同侧（true/false）
obstacle.avoidSameSide=true
